<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>舞台配置図 v14</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {margin:0;display:flex;height:100vh;font-family:sans-serif;background:#e8e6df;touch-action:none;}

#sidebar {width:200px;background:white;border-right:1px solid #ccc;display:flex;flex-direction:column;}

.tabs {display:flex;}
.tab {flex:1;padding:6px;text-align:center;border-bottom:2px solid transparent;cursor:pointer;font-size:12px;}
.tab.active {border-color:#1d9e75;color:#1d9e75;font-weight:bold;}

.inst-list {flex:1;overflow:auto;}
.inst {padding:6px;font-size:12px;border-bottom:1px solid #eee;cursor:pointer;}
.inst.active {background:#1d9e75;color:white;}

#main {flex:1;display:flex;flex-direction:column;}

#toolbar {
padding:6px;
background:white;
border-bottom:1px solid #ccc;
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:center;
font-size:12px;
}

button {padding:6px;font-size:12px;}
input[type=range]{width:80px;}

#stage {
width:960px;
height:760px;
margin:auto;
position:relative;
background:white;
border:1px solid #aaa;
overflow:hidden;
transform-origin:0 0;
}

.stage-grid {
position:absolute;inset:0;
background-image:
linear-gradient(rgba(0,0,0,0.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,0,0,0.05) 1px,transparent 1px);
background-size:30px 30px;
}

.elem {position:absolute;cursor:grab;}
.elem.selected {outline:2px dashed #1d9e75;}

.chair {
border-radius:50%;
border:2px solid;
display:flex;align-items:center;justify-content:center;
background:white;
box-sizing:border-box;
font-size:10px;
user-select:none;
}

#arcUI {position:absolute;top:60px;left:220px;background:white;padding:6px;border:1px solid #ccc;}
</style>
</head>

<body>

<div id="sidebar">
<div class="tabs">
<div class="tab active" onclick="switchTab('main',this)">メイン</div>
<div class="tab" onclick="switchTab('other',this)">その他</div>
</div>
<div id="mainList" class="inst-list"></div>
<div id="otherList" class="inst-list" style="display:none"></div>
</div>

<div id="main">

<div id="toolbar">
<button onclick="setTool('select')">選択</button>
<button onclick="setTool('chair')">椅子</button>
<button onclick="setTool('arc')">弧</button>
<button onclick="autoRow()">列</button>
<button onclick="autoFan()">扇形</button>
<button onclick="optimizeStage()">最適化</button>
<button onclick="loadPDF()">PDF</button>
<button onclick="loadImg()">画像</button>
<button onclick="exportPNG()">PNG</button>

<span>椅子</span>
<input type="range" id="chairSize" min="10" max="60" value="26">

<span>間隔</span>
<input type="range" id="spacing" min="20" max="80" value="40">

<span>ズーム</span>
<input type="range" id="zoom" min="50" max="150" value="100">
</div>

<div id="stage">
<canvas id="bg"></canvas>
<div class="stage-grid"></div>
</div>

<div id="arcUI" style="display:none">
椅子数 <input type="number" id="arcN" value="8">
</div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const MAIN=[
{l:"Pic",c:"#e35"},{l:"Fl",c:"#e35"},{l:"Ob",c:"#c44"},
{l:"B♭Cl",c:"#36a"},{l:"B.Cl",c:"#36a"},
{l:"A.Sax",c:"#1a8"},{l:"T.Sax",c:"#1a8"},{l:"B.Sax",c:"#1a8"},
{l:"Tp",c:"#c70"},{l:"Tb",c:"#a84"},
{l:"Hr",c:"#84a"},{l:"B.Tb",c:"#a84"},
{l:"Tu",c:"#08a"},{l:"Eu",c:"#08a"},{l:"Stb",c:"#555"}
];

const OTHER=[
{l:"Cor Angl.",c:"#c44"},{l:"E♭Cl",c:"#36a"},{l:"A.Cl",c:"#36a"},
{l:"CA.Cl",c:"#36a"},{l:"CB.Cl",c:"#36a"},{l:"S.Sax",c:"#1a8"},
{l:"PicTp",c:"#c70"},{l:"CorTp",c:"#c70"}
];

let currentInst=MAIN[0];
let elements=[];
let tool="select";
let arcPts=[];
let selected=[];
let drag=null;

let chairSize=26;
let spacing=40;
let zoom=1;
let pdfScale=1;

const stage=document.getElementById('stage');

// FIX: DOM取得を先に行う（TDZ回避）
const chairSizeEl=document.getElementById('chairSize');
const spacingEl=document.getElementById('spacing');
const zoomEl=document.getElementById('zoom');

function build(list,id){
 let el=document.getElementById(id);
 list.forEach(i=>{
  let d=document.createElement("div");
  d.className="inst";
  d.textContent=i.l;
  d.style.color=i.c;
  d.onclick=()=>currentInst=i;
  el.appendChild(d);
 });
}

build(MAIN,"mainList");
build(OTHER,"otherList");

function switchTab(n,el){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
 document.getElementById("mainList").style.display=n==="main"?"":"none";
 document.getElementById("otherList").style.display=n==="other"?"":"none";
}

function snap(v){return Math.round(v/spacing)*spacing;}

function addChair(x,y){
 elements.push({x,y,label:currentInst.l,color:currentInst.c});
 render();
}

function render(){
 stage.style.transform=`scale(${zoom})`;
 stage.querySelectorAll(".elem").forEach(e=>e.remove());

 let size=chairSize*pdfScale;

 elements.forEach((el,i)=>{
  let d=document.createElement("div");
  d.className="elem";

  if(selected.includes(i)) d.classList.add("selected");

  d.style.left=el.x+"px";
  d.style.top=el.y+"px";

  let c=document.createElement("div");
  c.className="chair";
  c.style.width=size+"px";
  c.style.height=size+"px";
  c.style.borderColor=el.color;
  c.style.color=el.color;
  c.textContent=el.label;

  d.onclick=()=>{
    if(tool!=="select") return;
    selected=[i];
    render();
  };

  d.onmousedown=(e)=>{
    if(tool!=="select") return;
    drag={x:e.clientX,y:e.clientY};
  };

  d.appendChild(c);
  stage.appendChild(d);
 });
}

window.onmousemove=(e)=>{
 if(!drag||selected.length===0) return;
 let dx=(e.clientX-drag.x)/zoom;
 let dy=(e.clientY-drag.y)/zoom;

 selected.forEach(i=>{
  elements[i].x=snap(elements[i].x+dx);
  elements[i].y=snap(elements[i].y+dy);
 });

 drag={x:e.clientX,y:e.clientY};
 render();
};

window.onmouseup=()=>drag=null;

function autoRow(){
 let x=100,y=100;
 elements.forEach((e,i)=>{
  e.x=x+i*spacing;
  e.y=y;
 });
 render();
}

function autoFan(){
 let cx=400,cy=300,r=180;
 elements.forEach((e,i)=>{
  let a=(i/(elements.length||1))*Math.PI;
  e.x=cx+Math.cos(a)*r;
  e.y=cy+Math.sin(a)*r;
 });
 render();
}

function optimizeStage(){
 let cols=Math.ceil(Math.sqrt(elements.length));
 elements.forEach((e,i)=>{
  e.x=100+(i%cols)*spacing;
  e.y=100+Math.floor(i/cols)*spacing;
 });
 render();
}

function loadPDF(){
 let i=document.createElement("input");i.type="file";i.accept=".pdf";
 i.onchange=e=>{
  let f=e.target.files[0];
  let r=new FileReader();
  r.onload=ev=>{
   pdfjsLib.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(pdf=>{
    pdf.getPage(1).then(p=>{
     let v=p.getViewport({scale:1});
     let c=document.getElementById("bg");
     let ctx=c.getContext("2d");

     c.width=v.width;
     c.height=v.height;

     pdfScale=stage.clientWidth/v.width;

     p.render({canvasContext:ctx,viewport:v});
     render();
    });
   });
  };
  r.readAsArrayBuffer(f);
 };
 i.click();
}

function loadImg(){
 let i=document.createElement("input");i.type="file";
 i.onchange=e=>{
  let img=new Image();
  img.onload=()=>{
   let c=document.getElementById("bg");
   let ctx=c.getContext("2d");
   c.width=img.width;c.height=img.height;
   ctx.drawImage(img,0,0);
   pdfScale=stage.clientWidth/img.width;
   render();
  };
  img.src=URL.createObjectURL(e.target.files[0]);
 };
 i.click();
}

function exportPNG(){
 html2canvas(stage).then(c=>{
  let a=document.createElement("a");
  a.href=c.toDataURL();
  a.download="stage.png";
  a.click();
 });
}

function setTool(t){tool=t;}

chairSizeEl.oninput=e=>{chairSize=+e.target.value;render();};
spacingEl.oninput=e=>{spacing=+e.target.value;render();};
zoomEl.oninput=e=>{zoom=+e.target.value/100;render();};

render();
</script>

</body>
</html>
